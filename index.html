<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma-HomeStay (Hospitality)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .custom-scroll::-webkit-scrollbar {
            display: none;
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 300ms, transform 300ms;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .booking-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
    </style>
</head>
<body class="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden shadow-2xl bg-white">

    <!-- Auth Overlay -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex flex-col p-8 transition-all duration-500">
        <div class="mt-20">
            <h1 class="text-3xl font-bold text-indigo-600">Namma-HomeStay</h1>
            <p class="text-gray-500 mt-2">Experience hospitality like never before.</p>
        </div>
        
        <div class="mt-12 space-y-4" id="login-form">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="auth-email" placeholder="user@example.com" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="auth-pass" placeholder="••••••••" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button onclick="handleAuth()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-semibold shadow-lg hover:bg-indigo-700 transition-colors">
                Login
            </button>
            <p class="text-center text-sm text-gray-500 mt-4">
                Don't have an account? <span class="text-indigo-600 font-semibold cursor-pointer">Sign up</span>
            </p>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-1 overflow-y-auto custom-scroll pb-24">
        <!-- Dynamic views will be injected here -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass-nav h-20 flex items-center justify-around px-4 z-50">
        <button onclick="navigate('home')" class="nav-item flex flex-col items-center space-y-1 text-indigo-600" id="nav-home">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">Home</span>
        </button>
        <button onclick="navigate('explore')" class="nav-item flex flex-col items-center space-y-1 text-gray-400" id="nav-explore">
            <i class="fas fa-search text-xl"></i>
            <span class="text-[10px] font-medium">Explore</span>
        </button>
        <button onclick="navigate('ai')" class="nav-item flex flex-col items-center space-y-1 text-gray-400" id="nav-ai">
            <div class="p-3 bg-indigo-100 rounded-full -mt-8 shadow-md">
                <i class="fas fa-robot text-indigo-600 text-xl"></i>
            </div>
            <span class="text-[10px] font-medium pt-1">Namma AI</span>
        </button>
        <button onclick="navigate('bookings')" class="nav-item flex flex-col items-center space-y-1 text-gray-400" id="nav-bookings">
            <i class="fas fa-calendar-check text-xl"></i>
            <span class="text-[10px] font-medium">Bookings</span>
        </button>
        <button onclick="navigate('profile')" class="nav-item flex flex-col items-center space-y-1 text-gray-400" id="nav-profile">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </button>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] w-full px-4 pointer-events-none"></div>

    <script>
        // Mock State Management
        const state = {
            user: null,
            currentView: 'home',
            wishlist: [],
            bookings: [
                { id: 'BK101', propertyName: 'Mountain View Villa', date: '2023-12-15', price: 4500, status: 'Confirmed' }
            ],
            properties: [
                { id: 1, name: "Cozy Forest Cabin", location: "Coorg, KA", price: 2500, rating: 4.8, type: "Nature", img: "https://images.unsplash.com/photo-1449156001931-96342467bc3a?q=80&w=600&auto=format&fit=crop", desc: "A serene cabin nestled deep in the coffee plantations of Coorg. Perfect for nature lovers.", amenities: ["WiFi", "Kitchen", "Free Parking", "BBQ"] },
                { id: 2, name: "Lakeside Retreat", location: "Ooty, TN", price: 3200, rating: 4.5, type: "Luxury", img: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?q=80&w=600&auto=format&fit=crop", desc: "Overlooking the tranquil Ooty lake, this stay offers the best sunrise views.", amenities: ["Lake View", "Fireplace", "Breakfast", "Heater"] },
                { id: 3, name: "Urban Penthouse", location: "Bangalore, KA", price: 5000, rating: 4.9, type: "Urban", img: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?q=80&w=600&auto=format&fit=crop", desc: "Sleek, modern living in the heart of Indiranagar. Close to all the best pubs and cafes.", amenities: ["Gym", "Pool", "Workspace", "Aircon"] },
                { id: 4, name: "Heritage Haveli", location: "Mysore, KA", price: 4200, rating: 4.7, type: "Heritage", img: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=600&auto=format&fit=crop", desc: "Experience royal living in a 100-year old restored heritage home.", amenities: ["Traditional Meal", "Library", "Courtyard"] }
            ]
        };

        const apiKey = ""; // Provided by environment

        // Routing Logic
        function navigate(view, params = {}) {
            state.currentView = view;
            const content = document.getElementById('app-content');
            content.innerHTML = '';
            
            // Update Nav UI
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('text-indigo-600');
                el.classList.add('text-gray-400');
            });
            const activeNav = document.getElementById(`nav-${view}`);
            if (activeNav) {
                activeNav.classList.remove('text-gray-400');
                activeNav.classList.add('text-indigo-600');
            }

            switch(view) {
                case 'home': renderHome(); break;
                case 'explore': renderExplore(); break;
                case 'ai': renderAI(); break;
                case 'bookings': renderBookings(); break;
                case 'profile': renderProfile(); break;
                case 'details': renderDetails(params.id); break;
            }
            content.scrollTo(0,0);
        }

        // View Renderers
        function renderHome() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="p-6">
                    <header class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-sm text-gray-500">Welcome back,</p>
                            <h2 class="text-xl font-bold text-gray-800">${state.user?.name || 'Traveler'}</h2>
                        </div>
                        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shadow-sm">
                            <i class="fas fa-bell"></i>
                        </div>
                    </header>

                    <!-- AI Suggestion Card -->
                    <div class="booking-gradient rounded-2xl p-5 text-white mb-8 relative overflow-hidden shadow-xl">
                        <div class="relative z-10">
                            <h3 class="font-bold text-lg">Namma Smart Pick ✨</h3>
                            <p class="text-sm opacity-90 mt-1">Based on your love for nature, Coorg is calling!</p>
                            <button onclick="navigate('details', {id: 1})" class="mt-4 bg-white text-indigo-600 px-4 py-2 rounded-lg text-sm font-semibold">View Suggestion</button>
                        </div>
                        <i class="fas fa-magic absolute -right-4 -bottom-4 text-white/10 text-8xl"></i>
                    </div>

                    <section>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-lg">Top Destinations</h3>
                            <button class="text-indigo-600 text-sm font-medium">View All</button>
                        </div>
                        <div class="flex space-x-4 overflow-x-auto custom-scroll pb-2">
                            ${state.properties.map(p => `
                                <div onclick="navigate('details', {id: ${p.id}})" class="min-w-[240px] bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden cursor-pointer">
                                    <img src="${p.img}" class="h-32 w-full object-cover" />
                                    <div class="p-3">
                                        <div class="flex justify-between items-start">
                                            <h4 class="font-bold text-gray-800 line-clamp-1">${p.name}</h4>
                                            <span class="text-xs font-bold text-green-600">★ ${p.rating}</span>
                                        </div>
                                        <p class="text-xs text-gray-500">${p.location}</p>
                                        <p class="mt-2 text-indigo-600 font-bold">₹${p.price}<span class="text-[10px] text-gray-400 font-normal"> /night</span></p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <section class="mt-8">
                        <h3 class="font-bold text-lg mb-4">Nearby Stays</h3>
                        <div class="space-y-4">
                            ${state.properties.slice(2).map(p => `
                                <div onclick="navigate('details', {id: ${p.id}})" class="flex bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                                    <img src="${p.img}" class="w-20 h-20 rounded-xl object-cover" />
                                    <div class="ml-4 flex-1">
                                        <h4 class="font-bold text-gray-800 text-sm">${p.name}</h4>
                                        <p class="text-xs text-gray-500">${p.location}</p>
                                        <div class="flex justify-between items-center mt-2">
                                            <span class="text-indigo-600 font-bold text-sm">₹${p.price}</span>
                                            <span class="text-xs text-gray-400">2.5 km away</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderExplore() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-4">Find your stay</h2>
                    <div class="relative mb-6">
                        <input type="text" id="search-input" placeholder="Search by city, type..." class="w-full p-4 pl-12 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 bg-indigo-600 text-white p-2 rounded-xl">
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>

                    <div class="flex space-x-3 overflow-x-auto custom-scroll mb-6">
                        <span class="px-4 py-2 bg-indigo-600 text-white rounded-full text-xs font-semibold whitespace-nowrap">All Homes</span>
                        <span class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold whitespace-nowrap">Nature</span>
                        <span class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold whitespace-nowrap">Luxury</span>
                        <span class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold whitespace-nowrap">Heritage</span>
                    </div>

                    <div class="grid grid-cols-1 gap-6">
                        ${state.properties.map(p => `
                            <div onclick="navigate('details', {id: ${p.id}})" class="group bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                                <div class="relative h-56">
                                    <img src="${p.img}" class="w-full h-full object-cover" />
                                    <div class="absolute top-4 right-4 bg-white/90 p-2 rounded-full shadow-md text-pink-500">
                                        <i class="far fa-heart"></i>
                                    </div>
                                </div>
                                <div class="p-5">
                                    <div class="flex justify-between items-center mb-1">
                                        <h3 class="text-lg font-bold text-gray-800">${p.name}</h3>
                                        <span class="bg-indigo-50 text-indigo-600 px-2 py-1 rounded-lg text-xs font-bold">★ ${p.rating}</span>
                                    </div>
                                    <p class="text-sm text-gray-500 mb-4">${p.location}</p>
                                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                                        <p class="text-lg font-bold text-indigo-600">₹${p.price}<span class="text-sm font-normal text-gray-400"> / night</span></p>
                                        <button class="text-indigo-600 font-semibold text-sm">Details <i class="fas fa-chevron-right text-xs"></i></button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderDetails(id) {
            const p = state.properties.find(prop => prop.id == id);
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="relative">
                    <button onclick="navigate('explore')" class="absolute top-6 left-6 z-10 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-lg">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <img src="${p.img}" class="w-full h-80 object-cover" />
                    <div class="bg-white -mt-8 rounded-t-[32px] p-6 relative">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h2 class="text-2xl font-bold text-gray-800">${p.name}</h2>
                                <p class="text-gray-500"><i class="fas fa-map-marker-alt text-indigo-600 mr-2"></i>${p.location}</p>
                            </div>
                            <div class="flex items-center bg-indigo-50 px-3 py-1 rounded-xl">
                                <i class="fas fa-star text-yellow-400 mr-1"></i>
                                <span class="font-bold text-indigo-600">${p.rating}</span>
                            </div>
                        </div>

                        <div class="flex space-x-6 my-6 overflow-x-auto custom-scroll">
                            ${p.amenities.map(a => `
                                <div class="flex flex-col items-center min-w-[60px]">
                                    <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-1">
                                        <i class="fas ${getIcon(a)}"></i>
                                    </div>
                                    <span class="text-[10px] text-gray-500">${a}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="mb-8">
                            <h3 class="font-bold text-lg mb-2">Description</h3>
                            <p class="text-gray-500 text-sm leading-relaxed">${p.desc} This homestay offers a unique blend of comfort and local culture, ensuring your stay is memorable.</p>
                        </div>

                        <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl mb-8">
                            <div class="flex items-center">
                                <div class="w-12 h-12 bg-indigo-200 rounded-full overflow-hidden mr-3">
                                    <img src="https://i.pravatar.cc/150?u=${p.id}" />
                                </div>
                                <div>
                                    <p class="font-bold text-sm">Hosted by Arjun</p>
                                    <p class="text-xs text-green-500">Highly Responsive</p>
                                </div>
                            </div>
                            <button class="bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold">Contact</button>
                        </div>

                        <div class="fixed bottom-24 left-0 right-0 px-6 max-w-md mx-auto">
                            <div class="bg-white p-4 rounded-2xl shadow-2xl flex items-center justify-between border border-gray-100">
                                <div>
                                    <p class="text-xs text-gray-400">Price for 2 nights</p>
                                    <p class="text-xl font-bold text-indigo-600">₹${p.price * 2}</p>
                                </div>
                                <button onclick="bookStay('${p.name}', ${p.price * 2})" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">Book Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAI() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="p-6 h-full flex flex-col">
                    <div class="flex items-center space-x-3 mb-6">
                        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold">Namma AI Assistant</h2>
                            <p class="text-xs text-green-500">Always online to help</p>
                        </div>
                    </div>

                    <div id="ai-chat-box" class="flex-1 overflow-y-auto custom-scroll space-y-4 mb-4">
                        <div class="bg-gray-100 p-4 rounded-2xl rounded-tl-none mr-12 text-sm text-gray-700">
                            Hello! I'm your Namma-HomeStay assistant. Tell me what kind of trip you're planning, and I'll find the perfect stay for you!
                        </div>
                    </div>

                    <div class="relative">
                        <input type="text" id="ai-input" placeholder="Try 'I want a peaceful cabin in Coorg'..." class="w-full p-4 pr-14 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <button onclick="askAI()" id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 bg-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <p class="text-[10px] text-gray-400 text-center mt-3">AI can make mistakes. Always verify property details before booking.</p>
                </div>
            `;
        }

        function renderBookings() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="p-6">
                    <h2 class="text-2xl font-bold mb-6">Your Bookings</h2>
                    
                    <div class="flex space-x-4 mb-8">
                        <button class="flex-1 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold">Upcoming</button>
                        <button class="flex-1 py-2 bg-gray-100 text-gray-500 rounded-xl text-sm font-semibold">Completed</button>
                    </div>

                    ${state.bookings.length === 0 ? `
                        <div class="flex flex-col items-center justify-center py-20 text-center">
                            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center text-gray-300 mb-4">
                                <i class="fas fa-calendar-times text-4xl"></i>
                            </div>
                            <h3 class="font-bold text-gray-800">No bookings yet</h3>
                            <p class="text-sm text-gray-500 mt-2 px-10">Start exploring beautiful stays around you and make your first booking today!</p>
                            <button onclick="navigate('explore')" class="mt-6 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Explore Now</button>
                        </div>
                    ` : `
                        <div class="space-y-6">
                            ${state.bookings.map(b => `
                                <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden">
                                    <div class="absolute top-0 right-0 bg-green-500 text-white text-[10px] px-3 py-1 rounded-bl-xl font-bold">
                                        ${b.status}
                                    </div>
                                    <p class="text-xs text-indigo-600 font-bold mb-1">BOOKING ID: ${b.id}</p>
                                    <h3 class="text-lg font-bold text-gray-800">${b.propertyName}</h3>
                                    <div class="mt-4 grid grid-cols-2 gap-4">
                                        <div>
                                            <p class="text-[10px] text-gray-400 uppercase font-bold">Check-In</p>
                                            <p class="text-sm font-bold">${b.date}</p>
                                        </div>
                                        <div>
                                            <p class="text-[10px] text-gray-400 uppercase font-bold">Total Paid</p>
                                            <p class="text-sm font-bold text-indigo-600">₹${b.price}</p>
                                        </div>
                                    </div>
                                    <div class="mt-6 flex space-x-3">
                                        <button class="flex-1 py-3 bg-gray-50 text-gray-700 rounded-xl text-xs font-bold border border-gray-100">Details</button>
                                        <button class="flex-1 py-3 bg-red-50 text-red-500 rounded-xl text-xs font-bold">Cancel</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        function renderProfile() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="p-6">
                    <div class="flex flex-col items-center mt-6">
                        <div class="relative">
                            <div class="w-24 h-24 bg-indigo-100 rounded-full border-4 border-white shadow-lg overflow-hidden">
                                <img src="https://i.pravatar.cc/150?u=current" />
                            </div>
                            <div class="absolute bottom-0 right-0 bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white">
                                <i class="fas fa-camera text-xs"></i>
                            </div>
                        </div>
                        <h3 class="mt-4 text-xl font-bold">${state.user?.name || 'Guest Traveler'}</h3>
                        <p class="text-gray-400 text-sm">Joined June 2023</p>
                    </div>

                    <div class="mt-10 space-y-2">
                        <button class="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm">
                            <div class="flex items-center">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mr-4">
                                    <i class="fas fa-user-edit"></i>
                                </div>
                                <span class="font-semibold text-gray-700">Edit Profile</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button class="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm">
                            <div class="flex items-center">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mr-4">
                                    <i class="fas fa-heart"></i>
                                </div>
                                <span class="font-semibold text-gray-700">Wishlist</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button class="w-full flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm">
                            <div class="flex items-center">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mr-4">
                                    <i class="fas fa-shield-alt"></i>
                                </div>
                                <span class="font-semibold text-gray-700">Privacy & Security</span>
                            </div>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button onclick="logout()" class="w-full flex items-center justify-between p-4 bg-red-50 rounded-2xl mt-8">
                            <div class="flex items-center">
                                <div class="w-10 h-10 bg-red-100 text-red-500 rounded-xl flex items-center justify-center mr-4">
                                    <i class="fas fa-sign-out-alt"></i>
                                </div>
                                <span class="font-semibold text-red-600">Logout</span>
                            </div>
                        </button>
                    </div>
                </div>
            `;
        }

        // Logic Functions
        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            if (!email.includes('@')) {
                showToast('Please enter a valid email', 'error');
                return;
            }
            state.user = { name: email.split('@')[0], email: email };
            document.getElementById('auth-screen').style.transform = 'translateY(-100%)';
            showToast(`Welcome to Namma-HomeStay, ${state.user.name}!`);
            navigate('home');
        }

        function logout() {
            state.user = null;
            document.getElementById('auth-screen').style.transform = 'translateY(0)';
        }

        function bookStay(name, price) {
            const id = 'BK' + Math.floor(Math.random() * 1000);
            state.bookings.unshift({
                id: id,
                propertyName: name,
                date: '2024-01-10',
                price: price,
                status: 'Confirmed'
            });
            showToast('Booking Successful! Check your history.');
            navigate('bookings');
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('ai-chat-box');
            const sendBtn = document.getElementById('send-btn');
            const query = input.value.trim();
            
            if (!query) return;

            // User Message
            chatBox.innerHTML += `
                <div class="bg-indigo-600 p-4 rounded-2xl rounded-tr-none ml-12 text-sm text-white self-end">
                    ${query}
                </div>
            `;
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Mock AI processing delay
            const thinkingMsg = document.createElement('div');
            thinkingMsg.className = "bg-gray-100 p-4 rounded-2xl rounded-tl-none mr-12 text-sm text-gray-500 animate-pulse";
            thinkingMsg.innerText = "Namma AI is searching for the best stays...";
            chatBox.appendChild(thinkingMsg);

            try {
                const systemPrompt = `You are an AI travel assistant for 'Namma-HomeStay'. 
                You have access to these properties: ${JSON.stringify(state.properties)}. 
                Help users find a stay based on their query. Be friendly, concise, and professional. 
                If they ask for a recommendation, mention a specific property name from the list.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I'm having trouble connecting right now. Try searching the 'Explore' tab!";
                
                chatBox.removeChild(thinkingMsg);
                chatBox.innerHTML += `
                    <div class="bg-gray-100 p-4 rounded-2xl rounded-tl-none mr-12 text-sm text-gray-700">
                        ${aiText}
                    </div>
                `;
            } catch (err) {
                chatBox.removeChild(thinkingMsg);
                chatBox.innerHTML += `
                    <div class="bg-red-50 p-4 rounded-2xl rounded-tl-none mr-12 text-sm text-red-600 border border-red-100">
                        Sorry, I encountered an error. Please try again later.
                    </div>
                `;
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Helpers
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `p-4 mb-4 rounded-xl text-white font-bold shadow-2xl transition-all duration-300 scale-90 opacity-0 ${type === 'success' ? 'bg-indigo-600' : 'bg-red-500'}`;
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('scale-90', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('scale-90', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getIcon(amenity) {
            const icons = {
                'WiFi': 'fa-wifi',
                'Kitchen': 'fa-utensils',
                'Free Parking': 'fa-parking',
                'BBQ': 'fa-fire',
                'Lake View': 'fa-water',
                'Fireplace': 'fa-fire-alt',
                'Breakfast': 'fa-coffee',
                'Heater': 'fa-thermometer-half',
                'Gym': 'fa-dumbbell',
                'Pool': 'fa-swimming-pool',
                'Workspace': 'fa-laptop-house',
                'Aircon': 'fa-wind',
                'Traditional Meal': 'fa-utensils',
                'Library': 'fa-book-open',
                'Courtyard': 'fa-tree'
            };
            return icons[amenity] || 'fa-check-circle';
        }

        // Initialize
        window.onload = () => {
            // Check if user already "logged in" in session
            const savedUser = sessionStorage.getItem('namma_user');
            if (savedUser) {
                state.user = JSON.parse(savedUser);
                document.getElementById('auth-screen').style.display = 'none';
                navigate('home');
            } else {
                // Keep auth screen visible
            }
        };
    </script>
</body>
</html>
